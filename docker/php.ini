; YOURLS dev container PHP overrides.

memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 60
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED
log_errors = On
date.timezone = "UTC"

; The Blade view cache lives under /var/www/html/user/cache/views.
; Make sure realpath cache is generous enough that template changes
; aren't accidentally cached forever in dev.
realpath_cache_size = 4096k
realpath_cache_ttl = 30

; Opcache: dev-friendly settings (revalidate every request).
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
