name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5', '8.6']
        include:
          - php: '8.1'
            coverage: xdebug
            flags: '--coverage-clover clover.xml'
    uses: ./.github/workflows/test-run.yml
    with:
      php: ${{ matrix.php }}
      coverage: ${{ matrix.coverage || 'none' }}
      flags: ${{ matrix.flags || '' }}
      continue-on-error: ${{ matrix.php == '8.6' }}
